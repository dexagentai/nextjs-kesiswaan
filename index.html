  <script src="/_sdk/47669dc8496955be.editing_sdk.js" integrity="sha512-SXgqvNdy3CX4R90Kr2d0cSNYZOv6KbcxTq/tprZCtYPHhvtgc5Aagp95xl8W/LNBFpixAlLGqjQW133qbh1QAg=="></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();

      const cards = Array.from(document.querySelectorAll(".tp-card"));
      const filters = Array.from(document.querySelectorAll("[data-filter]"));

      function setCardOpen(card, open) {
        card.classList.toggle("is-open", open);
        const button = card.querySelector(".detail-toggle");
        if (button) button.setAttribute("aria-expanded", String(open));
      }

      document.querySelectorAll(".detail-toggle").forEach((button) => {
        button.addEventListener("click", () => {
          const card = button.closest(".tp-card");
          setCardOpen(card, !card.classList.contains("is-open"));
        });
      });

      filters.forEach((button) => {
        button.addEventListener("click", () => {
          const selected = button.dataset.filter;
          filters.forEach((filterButton) => {
            const active = filterButton === button;
            filterButton.classList.toggle("is-active", active);
            filterButton.setAttribute("aria-pressed", String(active));
          });
          cards.forEach((card) => {
            const visible = selected === "all" || card.dataset.level === selected;
            card.classList.toggle("is-filtered-out", !visible);
          });
        });
      });

      document.getElementById("expand-all").addEventListener("click", () => {
        cards.filter(card => !card.classList.contains("is-filtered-out"))
          .forEach(card => setCardOpen(card, true));
      });

      document.getElementById("collapse-all").addEventListener("click", () => {
        cards.forEach(card => setCardOpen(card, false));
      });

      document.getElementById("print-button").addEventListener("click", () => {
        window.print();
      });
    });
  </script>
